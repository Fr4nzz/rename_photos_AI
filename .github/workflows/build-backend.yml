name: Build Backend Executable

on:
  push:
    branches: [web-app]
    paths:
      - 'web-app/backend/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: cd web-app/backend && npm ci

      - name: Download ExifTool
        shell: pwsh
        run: |
          $url = "https://exiftool.org/exiftool-13.10_64.zip"
          $zip = "exiftool.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath exiftool-tmp
          Copy-Item "exiftool-tmp/exiftool(-k).exe" "web-app/backend/bin/exiftool.exe"

      - name: Build with pkg
        run: cd web-app/backend && npx pkg . --targets node18-win-x64 --output dist/AIPhotoProcessor-Backend.exe

      - name: Copy exiftool to dist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path web-app/backend/dist/bin
          Copy-Item web-app/backend/bin/exiftool.exe web-app/backend/dist/bin/

      - uses: actions/upload-artifact@v4
        with:
          name: backend-windows
          path: web-app/backend/dist/

